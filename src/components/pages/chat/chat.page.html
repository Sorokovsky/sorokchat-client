@let currentChat = chat();
<div class="chat">
  @if (currentChat) {
    <app-chat-header [chat]="currentChat"></app-chat-header>
    <div class="chat-messages">

    </div>
    <div class="chat-send-message">
      <form>
        <input placeholder="Повідомлення" type="text">
        <button type="submit">
          Написати
        </button>
      </form>
    </div>
  } @else {
    <h2 class="no-chats">Виберіть чат</h2>
  }
</div>
