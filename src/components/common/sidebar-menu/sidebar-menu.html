<nav class="sidebar__menu">
  <ul>
    @for (item of menu(); track item.path) {
      <li>
        <a
          [routerLink]="getPath(item)"
          routerLinkActive="_active"
        >
          <lucide-icon
            [img]="item.icon"
            class="sidebar__icon"
          ></lucide-icon>
        </a>
      </li>
    }
  </ul>
</nav>
