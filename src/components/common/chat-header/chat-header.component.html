@let currentChat = chat();
<div class="chat-head">
  <div class="chat-head__left">
    <h2 class="chat-head__name">{{ currentChat.name }}</h2>
    <p class="chat-head__description">{{ currentChat.description }}</p>
  </div>
  <div class="chat-head__right">
    <button class="chat-head__button" type="button">Вийти</button>
    <button class="chat-head__button" type="button">Додати</button>
    <button class="chat-head__button" type="button">Інформація</button>
  </div>
</div>
