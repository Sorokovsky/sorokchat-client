<header class="header">
  <div class="container header__container">
    <a class="logo" routerLink="/">
      <img alt="Sorokchat logo" height="50" ngSrc="/logo.svg" priority width="50"></a>
    <nav class="menu">
      <ul>
        @for (page of getPages(); track page; ) {
          <li>
            <a [routerLink]="page.path">{{ page.title }}</a>
          </li>
        }
      </ul>
    </nav>
  </div>
</header>
