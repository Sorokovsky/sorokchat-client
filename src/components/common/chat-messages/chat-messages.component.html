<div class="chat-messages">
  <ul>
    @for (message of messages(); track message) {
      <li [class]="`message${isMyMessage(message) ? ' _my-message': ''}`">
        <span class="message__text">{{ message.text }}</span>
        <span>{{ message.suggested ? "✔️" : "❌" }}</span>
      </li>
    }
  </ul>
</div>
