@let chatMessage = message();
<li [class]="`message${isMyMessage(chatMessage) ? ' _my-message': ''}`">
  <div class="message__author">
    <app-avatar [user]="chatMessage.author || undefined"/>
  </div>
  <div class="message__main">
    <div class="message__top">
      <span class="message__text">{{ chatMessage.text || "Повідомлення пошкоджено" }}</span>
      <span>{{ chatMessage.suggested ? "✔️" : "❌" }}</span>
    </div>
    <div class="message-bottom"></div>
  </div>
</li>
